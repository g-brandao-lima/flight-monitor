services:
  - type: web
    name: flight-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./flight_monitor.db
      - key: SERPAPI_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_RECIPIENT
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"

  - type: cron
    name: flight-monitor-polling
    runtime: python
    plan: free
    schedule: "0 7 * * *"  # 7h UTC = 4h BRT
    buildCommand: pip install -r requirements.txt
    startCommand: python poll.py
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./flight_monitor.db
      - key: SERPAPI_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_RECIPIENT
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
